<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worth it?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    #score-btn {
      width: 100%;
      padding: 12px;
      background: #f0c040;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #score-btn:disabled { opacity: 0.5; cursor: default; }
    #score-btn:hover:not(:disabled) { opacity: 0.85; }
    #status {
      margin-top: 14px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      min-height: 18px;
    }
    #status.error { color: #e07070; }
  </style>
</head>
<body>
  <div class="logo">worth it?</div>
  <div class="tagline">Fiber science, not opinion</div>
  <button id="score-btn">Score this page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
